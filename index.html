<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clock#carter</title>
    <style>
    body {
        background-color: #000000;
        color: #34ad29;
        font-family: 'Courier New', monospace;
        margin: 0;
    }

    #clock {
        /* This moves it to the corner */
        position: absolute;
        top: 20px;
        right: 20px;

        /* This makes it smaller */
        font-size: 1.5rem; 
        padding: 10px;
        
        border: 2px solid #61fb6e;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(123, 251, 97, 0.5);
    }
</style>

</head>
<body>
    <div id="clock">00:00:00</div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');

            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Updates the clock every ______ milliseconds
        setInterval(updateClock, 1000);
        updateClock(); // Runns immediately on load
    </script>


   
</body>
</html>
